<!doctype html>
<html lang="en">

  <link rel="icon" type="image/png" href="assets/logos/taejoon_browser_logo.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="prebook">
  <div class="page-transition"></div>
  <div class="cursor cursor-outer"></div>
  <div class="cursor cursor-inner"></div>
  <canvas class="fx-canvas" aria-hidden="true"></canvas>
  <div class="ambient ambient-home"></div>

  <header class="site-header">
    <a class="brand-link transition-link" href="index.html" aria-label="Taejoon home">
      <img class="brand-mark" src="assets/logos/taejoon_browser_logo.png" alt="" aria-hidden="true">

    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <span class="nav-toggle__line"></span>
    </button>
    <nav class="site-nav">
      <a class="nav-link transition-link" href="index.html">Home</a>
      <a class="nav-link transition-link" href="about.html">About</a>

    <section class="panel">

  <script src="script.js"></script>
